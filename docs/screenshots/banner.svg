<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="DocAppointment Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2647"/>
      <stop offset="45%" stop-color="#144272"/>
      <stop offset="100%" stop-color="#2c74b3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dff6ff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>

  <circle cx="130" cy="80" r="170" fill="#ffffff" opacity="0.07"/>
  <circle cx="1450" cy="420" r="210" fill="#ffffff" opacity="0.06"/>
  <circle cx="1260" cy="120" r="90" fill="#ffffff" opacity="0.08"/>

  <rect x="120" y="90" width="1360" height="340" rx="28" fill="url(#card)"/>

  <text x="220" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700" fill="#0a2647">DocAppointment</text>
  <text x="220" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#144272">Smart Appointment Booking for Modern Clinics</text>

  <g transform="translate(220,300)">
    <rect x="0" y="0" width="250" height="52" rx="10" fill="#2c74b3"/>
    <text x="125" y="33" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff">Django + DRF</text>

    <rect x="270" y="0" width="220" height="52" rx="10" fill="#205295"/>
    <text x="380" y="33" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff">JWT Auth</text>

    <rect x="510" y="0" width="230" height="52" rx="10" fill="#1f6f8b"/>
    <text x="625" y="33" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff">MySQL Ready</text>
  </g>

  <g transform="translate(1060,165)">
    <rect x="0" y="0" width="300" height="200" rx="18" fill="#ffffff" stroke="#2c74b3" stroke-width="4"/>
    <rect x="20" y="24" width="260" height="20" rx="6" fill="#2c74b3" opacity="0.35"/>
    <rect x="20" y="62" width="180" height="14" rx="6" fill="#2c74b3" opacity="0.28"/>
    <rect x="20" y="88" width="220" height="14" rx="6" fill="#2c74b3" opacity="0.22"/>
    <rect x="20" y="125" width="115" height="44" rx="10" fill="#2c74b3"/>
    <text x="77" y="153" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#ffffff">Book</text>
  </g>
</svg>
