<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Profile - MediCare</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        /* --- 1. CRITICAL COLOR VARIABLES --- */
        :root {
            --primary: #4F46E5; --primary-dark: #4338ca; --secondary: #EC4899; --background: #f3f4f6;
            --surface: #ffffff; --text-primary: #111827; --text-secondary: #6b7280; --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            
            --success: #10b981; --success-light: #d1fae5; --warning: #f59e0b; --warning-light: #fef3c7;
            --danger: #ef4444; --danger-light: #fee2e2; --info: #3b82f6; --info-light: #dbeafe;
            --star: #fbbf24; --experience: #8b5cf6; --experience-light: #ede9fe;
            --fee: #059669; --fee-light: #d1fae5; --rating: #f59e0b; --rating-light: #fef3c7;
        }

        [data-theme="dark"] {
            --background: #111827; --surface: #1f2937; --text-primary: #f9fafb; --text-secondary: #d1d5db;
            --border: #374151; --success-light: rgba(16, 185, 129, 0.2); --warning-light: rgba(245, 158, 11, 0.2);
            --danger-light: rgba(239, 68, 68, 0.2); --info-light: rgba(59, 130, 246, 0.2);
            --experience-light: rgba(139, 92, 246, 0.2); --fee-light: rgba(5, 150, 105, 0.2);
            --rating-light: rgba(245, 158, 11, 0.2);
        }

        [data-theme="dark"] ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--background); color: var(--text-primary); transition: all 0.3s ease; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- HEADER --- */
        .header { background: var(--surface); padding: 1rem 0; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.6rem; }
        .header-controls { display: flex; align-items: center; gap: 15px; }

        /* --- BUTTONS --- */
        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--danger); color: white; transform: translateY(-1px); border-color: var(--danger); }
        .theme-toggle { background: var(--surface); color: var(--text-primary); font-size: 1.2rem; cursor: pointer; border: none; padding: 0.5rem; border-radius: 50%; }

        /* --- LAYOUT --- */
        .main-content { padding: 40px 0; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .nav-link { padding: 10px 20px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .nav-link:hover { background: var(--background); color: var(--primary); transform: translateY(-1px); }
        .nav-link.active { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        
        .profile-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .identity-card, .details-card { background: var(--surface); border-radius: 16px; padding: 30px; border: 1px solid var(--border); box-shadow: var(--shadow); height: fit-content; }
        .identity-card { text-align: center; }
        
        /* --- AVATAR STYLES (UPDATED) --- */
        .avatar-container { position: relative; width: 100px; margin: 0 auto 20px; }
        .avatar { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; border: 3px solid white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-edit-btn { position: absolute; bottom: 0; right: 0; background: var(--text-primary); color: var(--surface); border: 2px solid var(--surface); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .avatar-edit-btn:hover { background: var(--primary); transform: scale(1.1); }

        .user-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; color: var(--text-primary); }
        .user-email { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; padding: 8px 12px; background: var(--background); border-radius: 8px; border: 1px solid var(--border); }
        .role-badge { display: inline-block; padding: 8px 16px; background: linear-gradient(135deg, var(--info-light) 0%, var(--experience-light) 100%); color: var(--info); border-radius: 20px; font-size: 0.9rem; font-weight: 600; border: 1px solid rgba(59, 130, 246, 0.3); }

        /* --- FORM --- */
        .section-header { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .section-header h2 { font-size: 1.25rem; font-weight: 600; color: var(--primary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; }
        .form-input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary); font-size: 0.95rem; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .form-input:disabled { opacity: 0.6; cursor: not-allowed; background: var(--background); }
        
        /* --- ALERT --- */
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 0.9rem; border: 1px solid transparent; }
        .alert-success { background: var(--success-light); color: var(--success); }
        .alert-error { background: var(--danger-light); color: var(--danger); }
        .save-container { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); text-align: right; }

        /* --- MODAL FOR CROPPER --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); padding: 2rem; border-radius: 16px; width: 90%; max-width: 500px; position: relative; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.25rem; color: var(--text-primary); font-weight: 600; }
        .img-container { max-height: 400px; overflow: hidden; border-radius: 8px; background: #000; margin-bottom: 20px; }
        .img-container img { max-width: 100%; display: block; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

        @media (max-width: 768px) { .profile-grid, .form-grid { grid-template-columns: 1fr; } .nav-tabs { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo"><i class="fas fa-heart-pulse"></i> MediCare</a>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
                    <button onclick="logout()" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container main-content">
        <div class="nav-tabs">
            <a href="patient-appointments.html" class="nav-link"><i class="fas fa-calendar-check"></i> My Appointments</a>
            <a href="patient-profile.html" class="nav-link active"><i class="fas fa-file-medical-alt"></i> Medical Profile</a>
        </div>

        <div class="profile-grid">
            <div class="identity-card">
                <div class="avatar-container">
                    <div class="avatar" id="avatar-display">
                        <span id="avatar-text">?</span>
                        <img id="avatar-img" src="" style="display:none;">
                    </div>
                    <input type="file" id="profile_image_input" accept="image/*" style="display: none;">
                    <button class="avatar-edit-btn" onclick="document.getElementById('profile_image_input').click()" title="Change Profile Picture">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>

                <h1 class="user-name" id="display-name">Loading...</h1>
                <p class="user-email" id="display-email">...</p>
                <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);">
                    <span class="role-badge"><i class="fas fa-user-injured"></i> Patient Account</span>
                </div>
                <div style="margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary);">
                    <p><i class="fas fa-info-circle" style="color: var(--info);"></i> Keep your medical information updated for better care</p>
                </div>
            </div>

            <div class="details-card">
                <div class="section-header">
                    <i class="fas fa-file-medical-alt fa-lg" style="color: var(--primary);"></i>
                    <h2>Medical Information</h2>
                </div>

                <div id="status-msg" class="alert"></div>

                <form id="profile-form">
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-user" style="color: var(--primary);"></i> First Name</label><input type="text" id="fname" class="form-input" disabled></div>
                        <div class="form-group"><label><i class="fas fa-user" style="color: var(--primary);"></i> Last Name</label><input type="text" id="lname" class="form-input" disabled></div>
                        <div class="form-group"><label><i class="fas fa-birthday-cake" style="color: var(--secondary);"></i> Date of Birth</label><input type="date" id="dob" class="form-input"></div>
                        <div class="form-group">
                            <label><i class="fas fa-tint" style="color: var(--danger);"></i> Blood Group</label>
                            <select id="blood-group" class="form-input">
                                <option value="">Select...</option>
                                <option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option>
                                <option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                            </select>
                        </div>
                        <div class="form-group full-width"><label><i class="fas fa-map-marker-alt" style="color: var(--warning);"></i> Full Address</label><input type="text" id="address" class="form-input" placeholder="e.g. 123 Main St, City"></div>
                        <div class="form-group full-width"><label><i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i> Known Allergies</label><textarea id="allergies" class="form-input" placeholder="List any allergies..."></textarea></div>
                        <div class="form-group full-width"><label><i class="fas fa-history" style="color: var(--success);"></i> Medical History</label><textarea id="history" class="form-input" placeholder="Past surgeries, chronic conditions..."></textarea></div>
                    </div>
                    <div class="save-container">
                        <button type="submit" id="save-btn" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="crop-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Crop Profile Picture</h3>
                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; border:none;" onclick="closeCropModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="img-container">
                <img id="image-to-crop" src="">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeCropModal()">Cancel</button>
                <button type="button" class="btn btn-primary" id="crop-btn"><i class="fas fa-crop-alt"></i> Crop & Set</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/auth-utils.js"></script>
    <script>
        // Separate endpoints for clarity
        const API_MEDICAL_PROFILE = `${window.APP_CONFIG.API_BASE_URL}/api/my-medical-profile/`;
        const API_USER_PROFILE = `${window.APP_CONFIG.API_BASE_URL}/api/users/profile/`;
        
        let cropper;
        let croppedBlob = null;

        // --- 1. THEME LOGIC ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        setTheme(localStorage.getItem('theme') || 'light');
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

        // --- 2. LOAD DATA ---
        document.addEventListener('DOMContentLoaded', async () => {
            if (!sessionStorage.getItem('user')) { window.location.href = 'login.html'; return; }

            let user;
            try {
                user = JSON.parse(sessionStorage.getItem('user') || '{}');
            } catch {
                sessionStorage.removeItem('user');
                window.location.href = 'login.html';
                return;
            }
            if (user.role !== 'patient') { window.location.href = 'index.html'; return; }
            
            // Set initials as fallback
            const initials = (user.first_name?.[0] || 'U') + (user.last_name?.[0] || 'S');
            document.getElementById('avatar-text').textContent = initials.toUpperCase();
            document.getElementById('display-name').textContent = `${user.first_name} ${user.last_name}`;
            document.getElementById('display-email').textContent = user.email;
            document.getElementById('fname').value = user.first_name;
            document.getElementById('lname').value = user.last_name;

            try {
                // Fetch User Data (for Image)
                const userRes = await authApiFetch(API_USER_PROFILE);
                if(userRes.ok) {
                    const userData = await userRes.json();
                    if(userData.profile_image) {
                        document.getElementById('avatar-text').style.display = 'none';
                        const img = document.getElementById('avatar-img');
                        img.src = userData.profile_image;
                        img.style.display = 'block';
                    }
                }

                // Fetch Medical Data
                const medRes = await authApiFetch(API_MEDICAL_PROFILE);
                if (medRes.ok) {
                    const data = await medRes.json();
                    if(data.date_of_birth) document.getElementById('dob').value = data.date_of_birth;
                    if(data.blood_group) document.getElementById('blood-group').value = data.blood_group;
                    if(data.address) document.getElementById('address').value = data.address;
                    if(data.allergies) document.getElementById('allergies').value = data.allergies;
                    if(data.medical_history) document.getElementById('history').value = data.medical_history;
                }
            } catch (err) { console.error(err); }
            
            setupFileInputListener();
        });

        // --- 3. CROPPER LOGIC ---
        const cropModal = document.getElementById('crop-modal');
        const imageToCrop = document.getElementById('image-to-crop');
        const fileInput = document.getElementById('profile_image_input');

        function setupFileInputListener() {
            fileInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                     const reader = new FileReader();
                     reader.onload = function(evt) { openCropModal(evt.target.result); };
                     reader.readAsDataURL(e.target.files[0]);
                }
            });
        }

        function openCropModal(imgSrc) {
            imageToCrop.src = imgSrc;
            cropModal.style.display = 'flex';
            if (cropper) cropper.destroy();
            setTimeout(() => {
                cropper = new Cropper(imageToCrop, {
                    aspectRatio: 1, viewMode: 1, dragMode: 'move', autoCropArea: 0.8,
                    restore: false, guides: true, center: true, highlight: false,
                    cropBoxMovable: true, cropBoxResizable: true, toggleDragModeOnDblclick: false,
                });
            }, 200);
        }

        function closeCropModal() {
            cropModal.style.display = 'none';
            if (cropper) { cropper.destroy(); cropper = null; }
            fileInput.value = ''; 
        }

        document.getElementById('crop-btn').addEventListener('click', function() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            
            document.getElementById('avatar-text').style.display = 'none';
            const avatarImg = document.getElementById('avatar-img');
            avatarImg.src = canvas.toDataURL();
            avatarImg.style.display = 'block';

            canvas.toBlob(function(blob) {
                croppedBlob = blob;
                closeCropModal();
            }, 'image/jpeg', 0.9);
        });

        // --- 4. SAVE DATA (DUAL UPDATE) ---
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;
            try {
                // A. Save Image (if changed) - Goes to USER API
                if (croppedBlob) {
                    const formData = new FormData();
                    formData.append('profile_image', croppedBlob, 'profile.jpg');
                    await authApiFetch(API_USER_PROFILE, {
                        method: 'PATCH',
                        body: formData
                    });
                }

                // B. Save Medical Data - Goes to MEDICAL API
                const medicalPayload = {
                    date_of_birth: document.getElementById('dob').value || null,
                    blood_group: document.getElementById('blood-group').value || null,
                    address: document.getElementById('address').value || null,
                    allergies: document.getElementById('allergies').value || null,
                    medical_history: document.getElementById('history').value || null,
                };

                const res = await authApiFetch(API_MEDICAL_PROFILE, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(medicalPayload)
                });

                if (res.ok) {
                    showMessage('Profile updated successfully!', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
                    croppedBlob = null; // Reset blob
                } else {
                    showMessage('Failed to save medical details.', 'error');
                }

            } catch (err) {
                showMessage('Network error. Please check connection.', 'error');
            } finally {
                setTimeout(() => { btn.disabled = false; btn.innerHTML = originalContent; }, 1500);
            }
        });

        function showMessage(text, type = 'success') {
            const msgBox = document.getElementById('status-msg');
            msgBox.className = `alert alert-${type}`;
            msgBox.style.display = 'block';
            msgBox.textContent = text;
            setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
        }

        async function logout() {
            try {
                await fetch(`${window.APP_CONFIG.API_BASE_URL}/api/auth/logout/`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {
                console.warn('Logout request failed:', e);
            }
            sessionStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
