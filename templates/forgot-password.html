<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - MediCare</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('/static/css/login.css');
    
    /* Small extra style for the success message animation */
    .success-message {
        text-align: center;
        display: none;
        padding: 20px 0;
        animation: fadeIn 0.5s ease;
    }
    .success-icon {
        font-size: 3.5rem;
        color: #10B981;
        margin-bottom: 1rem;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" title="Toggle theme">
    <i class="fas fa-moon"></i>
  </button>

  <a href="login.html" class="back-btn">
    <i class="fas fa-arrow-left"></i>
    Back to Login
  </a>

  <div class="container">
    <div class="login-card">
      
      <div class="card-header">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-heart-pulse"></i>
          </div>
          <span class="logo-text">MediCare</span>
        </div>
        <h1 class="welcome-title">Reset Password</h1>
        <p class="welcome-subtitle">Enter your email to receive reset instructions</p>
      </div>

      <div class="card-body">
        
        <div id="success-view" class="success-message">
            <div class="success-icon">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h3 style="margin-bottom: 10px; color: var(--text-main);">Check your Inbox</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px;">
                We have sent a password reset link to <br>
                <strong id="user-email" style="color: var(--primary)"></strong>
            </p>
            <a href="login.html" class="btn btn-primary" style="text-decoration: none;">
                Return to Sign In
            </a>
        </div>

        <form id="reset-form" onsubmit="handleReset(event)">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your registered email" required>
            <small class="form-hint">We will send a password reset link to this email.</small>
          </div>
          
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="btn-text">Send Reset Link</span>
            <span id="btn-spinner" class="hidden">
              <span class="spinner"></span> Sending...
            </span>
          </button>
        </form>

      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/static/js/app-config.js"></script>
  <script>
    // --- 1. THEME MANAGEMENT (Matches Login Page) ---
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const savedTheme = localStorage.getItem('theme');
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        themeIcon.className = 'fas fa-sun';
        themeToggle.title = 'Switch to light theme';
      } else {
        themeIcon.className = 'fas fa-moon';
        themeToggle.title = 'Switch to dark theme';
      }
    }
    
    if (savedTheme) setTheme(savedTheme);
    else if (prefersDark.matches) setTheme('dark');
    else setTheme('light');
    
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // --- 2. RESET LOGIC ---
    const API_PASSWORD_RESET_EMAIL = `${window.APP_CONFIG.API_BASE_URL}/api/auth/password-reset-email/`;

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
      toast.style.cssText = `
        background: ${isError ? '#FEE2E2' : '#D1FAE5'};
        color: ${isError ? '#991B1B' : '#065F46'};
        border: 1px solid ${isError ? '#FCA5A5' : '#6EE7B7'};
        padding: 12px 16px;
        border-radius: 8px;
        margin-top: 10px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      `;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    async function handleReset(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const btn = document.getElementById('submitBtn');
        const text = document.getElementById('btn-text');
        const spinner = document.getElementById('btn-spinner');
        const form = document.getElementById('reset-form');
        const successView = document.getElementById('success-view');
        const headerSubtitle = document.querySelector('.welcome-subtitle');

        // Loading State
        btn.disabled = true;
        btn.classList.add('btn-loading');
        text.classList.add('hidden');
        spinner.classList.remove('hidden');

        try {
          const res = await fetch(API_PASSWORD_RESET_EMAIL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            const err = data.detail || 'Could not send reset email. Please try again.';
            showToast(err, true);
            return;
          }

          document.getElementById('user-email').textContent = email;
          form.style.display = 'none';
          headerSubtitle.style.display = 'none';
          successView.style.display = 'block';
          showToast(data.detail || 'Reset email sent successfully.');
        } catch (error) {
          showToast('Network error. Check if backend server is running.', true);
        } finally {
          btn.disabled = false;
          btn.classList.remove('btn-loading');
          text.classList.remove('hidden');
          spinner.classList.add('hidden');
        }
    }
  </script>
</body>
</html>
