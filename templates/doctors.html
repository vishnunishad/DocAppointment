<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctors - MediCare</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. CRITICAL COLOR VARIABLES --- */
        :root {
            --primary: #4F46E5; --primary-dark: #4338ca; --secondary: #EC4899; --background: #f3f4f6;
            --surface: #ffffff; --text-primary: #111827; --text-secondary: #6b7280; --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            
            --success: #10b981; --success-light: #d1fae5; --warning: #f59e0b; --warning-light: #fef3c7;
            --danger: #ef4444; --danger-light: #fee2e2; --info: #3b82f6; --info-light: #dbeafe;
            --star: #fbbf24; --experience: #8b5cf6; --experience-light: #ede9fe;
            --fee: #059669; --fee-light: #d1fae5; --rating: #f59e0b; --rating-light: #fef3c7;
        }

        [data-theme="dark"] {
            --background: #111827; --surface: #1f2937; --text-primary: #f9fafb; --text-secondary: #d1d5db;
            --border: #374151; --success-light: rgba(16, 185, 129, 0.2); --warning-light: rgba(245, 158, 11, 0.2);
            --danger-light: rgba(239, 68, 68, 0.2); --info-light: rgba(59, 130, 246, 0.2);
            --experience-light: rgba(139, 92, 246, 0.2); --fee-light: rgba(5, 150, 105, 0.2);
            --rating-light: rgba(245, 158, 11, 0.2);
        }

        [data-theme="dark"] ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--background); color: var(--text-primary); transition: all 0.3s ease; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .header { background: var(--surface); padding: 1rem 0; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.6rem; }
        .header-controls { display: flex; align-items: center; gap: 15px; }

        .btn { padding: 0.5rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-secondary { background: var(--info-light); color: var(--info); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--info); color: white; }
        .btn-block { width: 100%; display: block; text-align: center; }
        .theme-toggle { background: var(--surface); color: var(--text-primary); font-size: 1.2rem; cursor: pointer; border: none; padding: 0.5rem; border-radius: 50%; }

        .page-header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 80px 0; text-align: center; margin-bottom: 2rem; position: relative; overflow: hidden; }
        .page-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(255,255,255,0.1)"/></svg>'); background-size: cover; }
        .page-header h1 { margin-bottom: 10px; font-size: 2.5rem; }
        .page-header p { opacity: 0.9; font-size: 1.1rem; }

        .search-section { margin: 30px 0; padding: 20px; background: var(--surface); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .search-container { display: flex; gap: 15px; }
        .search-input { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; background: var(--background); color: var(--text-primary); font-size: 0.95rem; }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .doctors-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding-bottom: 4rem; }
        .doctor-card { background: var(--surface); border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; transition: all 0.3s ease; position: relative; }
        .doctor-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); border-color: var(--primary); }

        .doctor-header { padding: 2rem; text-align: center; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .doctor-header:hover { background: linear-gradient(135deg, rgba(79, 70, 229, 0.05) 0%, rgba(236, 72, 153, 0.05) 100%); }
        
        .doctor-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; margin: 0 auto 1rem; border: 3px solid white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); overflow: hidden; }
        .doctor-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .doctor-body { padding: 1.5rem; }
        .doctor-info-row { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
        .doctor-info-row:hover { background: var(--background); }
        .doctor-info-row:nth-child(1) { background: var(--experience-light); } .doctor-info-row:nth-child(1) i, .doctor-info-row:nth-child(1) strong { color: var(--experience); }
        .doctor-info-row:nth-child(2) { background: var(--fee-light); } .doctor-info-row:nth-child(2) i, .doctor-info-row:nth-child(2) strong { color: var(--fee); }
        .doctor-info-row:nth-child(3) { background: var(--rating-light); } .doctor-info-row:nth-child(3) i, .doctor-info-row:nth-child(3) strong { color: var(--star); }
        
        .doctor-name { color: var(--text-primary); margin-bottom: 5px; font-size: 1.1rem; font-weight: 700; }
        .doctor-spec { color: var(--secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; padding: 4px 12px; background: linear-gradient(135deg, rgba(236, 72, 153, 0.1) 0%, rgba(79, 70, 229, 0.1) 100%); border-radius: 20px; display: inline-block; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: var(--surface); color: var(--text-primary); padding: 2rem; border-radius: 16px; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); position: relative; animation: modalSlide 0.3s ease; border: 1px solid var(--border); }
        @keyframes modalSlide { from { transform: translateY(-20px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); background: none; border: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { color: var(--danger); background: var(--danger-light); transform: rotate(90deg); }

        .profile-hero { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .profile-avatar-lg { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; border: 3px solid white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); overflow: hidden; }
        .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
        .profile-title h2 { margin-bottom: 5px; }
        .profile-title p { color: var(--secondary); font-weight: 500; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-item { padding: 12px; border-radius: 8px; background: var(--background); border: 1px solid var(--border); }
        .info-item label { display: block; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .info-item div { font-weight: 600; font-size: 0.95rem; }
        
        .section-divider { margin: 20px 0; padding: 15px 0; border-top: 2px solid var(--border); border-bottom: 2px solid var(--border); }
        .section-title { font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .medical-notes { background: var(--background); padding: 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; border: 1px solid var(--border); margin-bottom: 20px; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; }
        .form-input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary); font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); }
        .empty-state i { font-size: 3rem; margin-bottom: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .empty-state h3 { margin-bottom: 10px; color: var(--text-primary); }
        .empty-state p { color: var(--text-secondary); max-width: 500px; margin: 0 auto; }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo"><i class="fas fa-heart-pulse"></i> MediCare</a>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <a href="index.html" class="btn btn-outline"><i class="fas fa-home"></i> Home</a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>Find Your Healthcare Specialist</h1>
            <p>Connect with trusted doctors and book appointments seamlessly</p>
        </div>
    </section>

    <section class="container">
        <div class="search-section">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search by name, specialization, or clinic address..." onkeyup="filterDoctors()">
                <button class="btn btn-secondary" onclick="filterDoctors()"><i class="fas fa-search"></i> Search</button>
            </div>
        </div>

        <div id="doctors-container" class="doctors-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 3rem;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary)"></i>
                <p>Loading Doctors...</p>
            </div>
        </div>
    </section>

    <div id="doctor-profile-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProfileModal()">&times;</button>
            
            <div class="profile-hero">
                <div class="profile-avatar-lg" id="p-avatar"></div>
                <div class="profile-title">
                    <h2 id="p-name">Dr. Loading...</h2>
                    <p id="p-spec">Specialization</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item"><label><i class="fas fa-briefcase-medical" style="color: var(--experience);"></i> Experience</label><div id="p-exp">--</div></div>
                <div class="info-item"><label><i class="fas fa-rupee-sign" style="color: var(--fee);"></i> Consultation Fee</label><div id="p-fee" style="color: var(--fee);">--</div></div>
                <div class="info-item"><label><i class="fas fa-user" style="color: var(--info);"></i> Age</label><div id="p-age">--</div></div>
                <div class="info-item"><label><i class="fas fa-phone" style="color: var(--primary);"></i> Contact</label><div id="p-phone">--</div></div>
            </div>

            <div class="section-divider">
                <div class="section-title"><i class="fas fa-map-marker-alt" style="color: var(--danger);"></i> Clinic Address</div>
                <div id="p-address" class="medical-notes">Address not available</div>
            </div>

            <div>
                <div class="section-title"><i class="fas fa-user-md" style="color: var(--secondary);"></i> Professional Bio</div>
                <div id="p-bio" class="medical-notes">No professional biography provided.</div>
            </div>

            <div class="action-buttons">
                <button onclick="closeProfileModal()" class="btn btn-outline" style="flex: 1;">Close</button>
                <button id="p-book-btn" class="btn btn-primary" style="flex: 2;"><i class="fas fa-calendar-check"></i> Book Appointment</button>
            </div>
        </div>
    </div>

    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 style="margin-bottom: 1rem;">Book Appointment</h2>
            <div id="modal-doctor-info" style="margin-bottom: 1.5rem; padding: 1rem; background: var(--background); border-radius: 8px; font-size: 0.9rem;"></div>
            <form id="booking-form">
                <input type="hidden" id="doctor-id">
                <input type="hidden" id="consultation-fee">
                <div class="form-group">
                    <label><i class="fas fa-calendar" style="color: var(--primary);"></i> Select Date</label>
                    <input type="date" id="book-date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-clock" style="color: var(--warning);"></i> Select Time (24 Hours)</label>
                    <input type="time" id="book-time" class="form-input" required min="00:00" max="23:59">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-stethoscope" style="color: var(--success);"></i> Reason for Visit</label>
                    <textarea id="book-notes" class="form-input" rows="3" placeholder="Describe your symptoms or concerns..."></textarea>
                </div>
                <div class="action-buttons" style="margin-top: 1.5rem;">
                    <button type="button" onclick="closeModal()" class="btn btn-outline" style="flex: 1;">Cancel</button>
                    <button type="submit" id="confirm-btn" class="btn btn-primary" style="flex: 1;">
                        <span id="submit-text">Confirm Booking</span>
                        <span id="submit-spinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/auth-utils.js"></script>
    <script>
        const API_BASE = `${window.APP_CONFIG.API_BASE_URL}/api`;
        const DEFAULT_CONSULTATION_FEE = 500;
        const doctorsContainer = document.getElementById('doctors-container');
        let allDoctors = [];
        let filteredDoctors = [];

        // --- THEME LOGIC ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        setTheme(localStorage.getItem('theme') || 'light');
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

        // --- LOAD DOCTORS ---
        document.addEventListener('DOMContentLoaded', loadDoctors);

        async function loadDoctors() {
            try {
                const response = await fetch(`${API_BASE}/users/doctors/`, {
                     headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error("Server Error");
                allDoctors = await response.json();
                filteredDoctors = [...allDoctors];
                renderDoctors();
            } catch (error) {
                console.error(error);
                doctorsContainer.innerHTML = `<div class="empty-state"><h3>Unable to load doctors</h3></div>`;
            }
        }

        // --- RENDER DOCTORS ---
        function renderDoctors() {
            if (filteredDoctors.length === 0) {
                doctorsContainer.innerHTML = `<div class="empty-state"><h3>No doctors found</h3><button class="btn btn-outline" onclick="clearSearch()">Clear Search</button></div>`;
                return;
            }

            doctorsContainer.innerHTML = '';
            filteredDoctors.forEach(doc => {
                // --- IMAGE LOGIC ---
                let avatarHTML;
                if (doc.profile_image) {
                    avatarHTML = `<img src="${doc.profile_image}" alt="Dr. ${doc.last_name}">`;
                } else {
                    const initials = (doc.first_name?.[0] || 'D') + (doc.last_name?.[0] || 'R');
                    avatarHTML = initials.toUpperCase();
                }

                const card = `
                    <div class="doctor-card">
                        <div class="doctor-header" onclick="viewDoctorProfile(${doc.id})">
                            <div class="doctor-avatar">${avatarHTML}</div>
                            <h3 class="doctor-name">Dr. ${doc.first_name} ${doc.last_name}</h3>
                            <p class="doctor-spec">${doc.specialization || 'General Physician'}</p>
                        </div>
                        <div class="doctor-body">
                            <div class="doctor-info-row"><span><i class="fas fa-briefcase-medical"></i> Experience</span><strong>${doc.experience || 0} Years</strong></div>
                            <div class="doctor-info-row"><span><i class="fas fa-rupee-sign"></i> Fee</span><strong>₹${doc.consultation_fee || DEFAULT_CONSULTATION_FEE}</strong></div>
                            <button onclick="openBookingModal('${doc.id}', '${doc.first_name}', '${doc.last_name}', '${doc.consultation_fee || DEFAULT_CONSULTATION_FEE}')" 
                                    class="btn btn-primary btn-block" style="margin-top: 1rem;">
                                <i class="fas fa-calendar-plus"></i> Book Appointment
                            </button>
                        </div>
                    </div>`;
                doctorsContainer.innerHTML += card;
            });
        }

        function filterDoctors() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (!searchTerm.trim()) { filteredDoctors = [...allDoctors]; } 
            else {
                filteredDoctors = allDoctors.filter(doc => {
                    const fullName = `dr. ${doc.first_name} ${doc.last_name}`.toLowerCase();
                    const specialization = (doc.specialization || '').toLowerCase();
                    const clinicAddress = (doc.address || '').toLowerCase();
                    return fullName.includes(searchTerm) || specialization.includes(searchTerm) || clinicAddress.includes(searchTerm);
                });
            }
            renderDoctors();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            filteredDoctors = [...allDoctors];
            renderDoctors();
        }

        async function viewDoctorProfile(id) {
            const doc = allDoctors.find(d => d.id == id);
            if(!doc) return;

            const avatarContainer = document.getElementById('p-avatar');
            if (doc.profile_image) {
                avatarContainer.innerHTML = `<img src="${doc.profile_image}" alt="Dr. ${doc.last_name}">`;
            } else {
                avatarContainer.textContent = (doc.first_name?.[0] || 'D') + (doc.last_name?.[0] || 'R');
            }

            document.getElementById('p-name').textContent = `Dr. ${doc.first_name} ${doc.last_name}`;
            document.getElementById('p-spec').textContent = doc.specialization || 'General Physician';
            document.getElementById('p-exp').textContent = `${doc.experience || 0} Years`;
            document.getElementById('p-fee').textContent = `₹${doc.consultation_fee || DEFAULT_CONSULTATION_FEE}`;
            document.getElementById('p-age').textContent = doc.age || 'Not specified';
            document.getElementById('p-phone').textContent = doc.phone || 'Not available';
            document.getElementById('p-address').textContent = doc.address || 'Clinic address not provided';
            document.getElementById('p-bio').textContent = doc.bio || 'No professional biography provided.';
            
            document.getElementById('p-book-btn').onclick = () => {
                closeProfileModal();
                openBookingModal(doc.id, doc.first_name, doc.last_name, doc.consultation_fee || DEFAULT_CONSULTATION_FEE);
            };

            document.getElementById('doctor-profile-modal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('doctor-profile-modal').style.display = 'none'; }

        // --- BOOKING LOGIC (24/7) ---
        function updateTimeConstraints() {
            const dateInput = document.getElementById('book-date');
            const timeInput = document.getElementById('book-time');
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const currentHM = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            dateInput.min = todayStr;
            
            if (dateInput.value === todayStr) {
                // If today, prevent booking in past time. Open 24/7 otherwise.
                timeInput.min = currentHM;
            } else {
                // Future dates open from midnight
                timeInput.min = "00:00";
            }
        }
        document.getElementById('book-date').addEventListener('change', updateTimeConstraints);

        function openBookingModal(id, fname, lname, fee) {
            const userStr = sessionStorage.getItem('user');
            if (!userStr) {
                alert("Please sign in to book an appointment!");
                window.location.href = 'login.html';
                return;
            }

            let user;
            try {
                user = JSON.parse(userStr);
            } catch {
                user = {};
            }

            if (user.role !== 'patient') {
                alert("Only patient accounts can book appointments.");
                return;
            }

            document.getElementById('doctor-id').value = id;
            document.getElementById('consultation-fee').value = fee;
            document.getElementById('modal-doctor-info').innerHTML = `<strong>Dr. ${fname} ${lname}</strong><br><small>Consultation Fee: <strong style="color: var(--fee);">₹${fee}</strong></small>`;
            
            const dateInput = document.getElementById('book-date');
            dateInput.value = new Date().toISOString().split('T')[0];
            updateTimeConstraints();

            // Suggest next hour, cap at 23:59
            const now = new Date();
            const nextHour = now.getHours() + 1;
            const suggestedTime = `${String(nextHour).padStart(2, '0')}:00`;
            const timeInput = document.getElementById('book-time');

            if (suggestedTime >= timeInput.min && suggestedTime <= "23:59") {
                timeInput.value = suggestedTime;
            } else {
                timeInput.value = timeInput.min;
            }

            document.getElementById('booking-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('booking-modal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target.classList.contains('modal-overlay')) { closeModal(); closeProfileModal(); } }

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('confirm-btn');
            const submitText = document.getElementById('submit-text');
            const submitSpinner = document.getElementById('submit-spinner');
            
            submitBtn.disabled = true;
            submitText.style.display = 'none';
            submitSpinner.style.display = 'inline';
            
            try {
                const response = await authApiFetch(`${API_BASE}/appointments/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        doctor: document.getElementById('doctor-id').value,
                        date: document.getElementById('book-date').value,
                        time: document.getElementById('book-time').value,
                        notes: document.getElementById('book-notes').value,
                        consultation_fee: document.getElementById('consultation-fee').value
                    })
                });
                
                if (response.ok) {
                    alert("✅ Appointment Booked Successfully!");
                    closeModal();
                    setTimeout(() => window.location.href = 'patient-appointments.html', 500);
                } else {
                    const data = await response.json();
                    alert(`❌ ${data.detail || 'Booking failed.'}`);
                }
            } catch (err) { alert("⚠️ Network Error."); } 
            finally {
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                submitSpinner.style.display = 'none';
            }
        });

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeProfileModal(); } });
        document.getElementById('search-input').focus();
    </script>
</body>
</html>
