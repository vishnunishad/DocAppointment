<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - MediCare</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --primary: #4F46E5; --primary-dark: #4338ca; --secondary: #EC4899; --background: #f3f4f6;
            --surface: #ffffff; --text-primary: #111827; --text-secondary: #6b7280; --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            
            --status-pending-bg: #FEF3C7; --status-pending-text: #D97706; --status-pending-border: #F59E0B;
            --status-confirmed-bg: #D1FAE5; --status-confirmed-text: #059669; --status-confirmed-border: #10B981;
            --status-cancelled-bg: #FEE2E2; --status-cancelled-text: #DC2626; --status-cancelled-border: #EF4444;
            --status-completed-bg: #E0E7FF; --status-completed-text: #3730A3; --status-completed-border: #4F46E5;

            --card-date-color: #8B5CF6; --card-time-color: #F59E0B; --card-fee-color: #059669;
        }

        [data-theme="dark"] {
            --background: #111827; --surface: #1f2937; --text-primary: #f9fafb; --text-secondary: #d1d5db; --border: #374151;
            --status-pending-bg: rgba(245, 158, 11, 0.2); --status-pending-text: #FBBF24;
            --status-confirmed-bg: rgba(16, 185, 129, 0.2); --status-confirmed-text: #34D399;
            --status-cancelled-bg: rgba(239, 68, 68, 0.2); --status-cancelled-text: #F87171;
            --status-completed-bg: rgba(79, 70, 229, 0.2); --status-completed-text: #818CF8;
        }

        /* --- 2. GLOBAL STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--background); color: var(--text-primary); transition: all 0.3s ease; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* --- 3. HEADER --- */
        .header { background: var(--surface); padding: 1rem 0; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { -webkit-text-fill-color: initial; color: var(--primary); }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        
        .btn { padding: 0.6rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-danger-outline { border: 2px solid var(--status-cancelled-border); color: var(--status-cancelled-text); background: transparent; }
        .btn-danger-outline:hover { background: var(--status-cancelled-bg); }
        .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); font-size: 1.2rem; cursor: pointer; padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .theme-toggle:hover { background: var(--primary); color: white; transform: rotate(15deg); }

        /* --- 4. DASHBOARD HEADER --- */
        .dashboard-header { display: flex; justify-content: space-between; align-items: end; margin: 40px 0 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .dashboard-title h1 { font-size: 2.2rem; margin-bottom: 8px; color: var(--text-primary); }
        .dashboard-title p { color: var(--text-secondary); font-size: 1.1rem; }
        .user-welcome { font-weight: 600; color: var(--primary); }

        /* --- 5. STATS CARDS --- */
        .stats-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .stat-card { background: var(--surface); border-radius: 999px; padding: 8px 12px; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; cursor: pointer; min-height: 36px; color: var(--text-primary); }
        .stat-card:hover { transform: translateY(-1px); border-color: var(--primary); }
        .stat-card.active-filter { border-color: var(--primary); background: var(--primary); color: #fff; }
        .stat-card.active-filter .stat-info h3 { color: rgba(255, 255, 255, 0.92); }
        .stat-card.active-filter .stat-info strong { color: var(--primary); background: #fff; border-color: #fff; }
        .stat-card.active-filter .stat-icon { color: #fff !important; opacity: 1; }
        .stat-icon { font-size: 0.85rem; opacity: 0.8; }
        .stat-info { display: inline-flex; align-items: center; gap: 6px; }
        .stat-info h3 { font-size: 0.82rem; color: var(--text-secondary); margin: 0; font-weight: 600; }
        .stat-info strong { font-size: 0.82rem; color: var(--text-primary); line-height: 1; background: var(--background); border: 1px solid var(--border); border-radius: 999px; padding: 2px 7px; }

        /* --- 6. APPOINTMENTS GRID --- */
        .appointments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding-bottom: 50px; }
        .app-card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all 0.3s ease; position: relative; overflow: hidden; animation: fadeIn 0.5s ease; }
        .app-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(to bottom, var(--primary) 0%, var(--secondary) 100%); }
        .app-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .doctor-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        
        /* UPDATED AVATAR CSS TO SUPPORT IMAGES */
        .doctor-avatar { 
            width: 60px; height: 60px; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.4rem; 
            border: 3px solid white; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            overflow: hidden; /* Important for clipping image */
        }
        .doctor-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .doctor-text h3 { font-size: 1.2rem; margin-bottom: 4px; color: var(--text-primary); }
        .doctor-text span { font-size: 0.9rem; color: var(--secondary); font-weight: 500; padding: 4px 12px; background: rgba(236, 72, 153, 0.1); border-radius: 20px; }

        .app-details { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding: 20px; background: var(--background); border-radius: 12px; border: 1px solid var(--border); }
        .detail-row { display: flex; align-items: center; gap: 12px; color: var(--text-primary); font-size: 0.95rem; }
        .detail-row i { width: 24px; text-align: center; font-size: 1.1rem; }
        
        .app-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
        .app-actions { display: flex; gap: 10px; align-items: center; }
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; text-transform: capitalize; }

        .empty-state { text-align: center; padding: 80px 20px; grid-column: 1 / -1; background: var(--surface); border-radius: 20px; border: 2px dashed var(--border); }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.7; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .empty-state h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text-primary); }
        .empty-state p { color: var(--text-secondary); max-width: 400px; margin: 0 auto 25px; }
        .feedback-toast { position: fixed; right: 20px; bottom: 20px; z-index: 2500; background: var(--surface); color: var(--text-primary); border: 1px solid var(--status-confirmed-border); border-left: 5px solid var(--status-confirmed-border); border-radius: 10px; box-shadow: var(--shadow); padding: 12px 14px; font-size: 0.9rem; animation: slideUp 0.25s ease; }
        .feedback-toast.error { border-color: var(--status-cancelled-border); border-left-color: var(--status-cancelled-border); }

        /* --- 8. MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); animation: fadeIn 0.3s ease; }
        .modal-content { background: var(--surface); color: var(--text-primary); padding: 2rem; border-radius: 16px; width: 90%; max-width: 500px; position: relative; border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); background: none; border: none; transition: all 0.2s; }
        .close-btn:hover { color: var(--status-cancelled-text); transform: rotate(90deg); }
        .modal-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .modal-row:last-child { border-bottom: none; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @media (max-width: 768px) { .appointments-grid { grid-template-columns: 1fr; } .dashboard-header { flex-direction: column; align-items: flex-start; gap: 20px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo"><i class="fas fa-heart-pulse"></i> MediCare</a>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
                    <button onclick="handleLogout()" class="btn btn-danger-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <div class="dashboard-title">
                <h1>My Appointments</h1>
                <p>Welcome back, <span class="user-welcome" id="user-name">Patient</span></p>
            </div>
            <div style="display:flex; gap:12px; flex-wrap: wrap;">
                <a href="patient-profile.html" class="btn btn-outline"><i class="fas fa-user-circle"></i> Medical Profile</a>
                <a href="doctors.html" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Book New</a>
            </div>
        </div>

        <div class="stats-grid" id="stats-container">
            <button type="button" class="stat-card" id="card-pending" onclick="filterAppointments('pending')">
                <span class="stat-icon" style="color: var(--status-pending-text);"><i class="fas fa-clock"></i></span>
                <span class="stat-info"><h3>Pending</h3><strong id="pending-count">0</strong></span>
            </button>
            <button type="button" class="stat-card" id="card-confirmed" onclick="filterAppointments('confirmed')">
                <span class="stat-icon" style="color: var(--status-confirmed-text);"><i class="fas fa-calendar-check"></i></span>
                <span class="stat-info"><h3>Confirmed</h3><strong id="confirmed-count">0</strong></span>
            </button>
            <button type="button" class="stat-card" id="card-cancelled" onclick="filterAppointments('cancelled')">
                <span class="stat-icon" style="color: var(--status-cancelled-text);"><i class="fas fa-calendar-times"></i></span>
                <span class="stat-info"><h3>Cancelled</h3><strong id="cancelled-count">0</strong></span>
            </button>
            <button type="button" class="stat-card" id="card-completed" onclick="filterAppointments('completed')">
                <span class="stat-icon" style="color: var(--status-completed-text);"><i class="fas fa-circle-check"></i></span>
                <span class="stat-info"><h3>Completed</h3><strong id="completed-count">0</strong></span>
            </button>
            <button type="button" class="stat-card active-filter" id="card-all" onclick="filterAppointments('all')">
                <span class="stat-icon" style="color: var(--status-completed-text);"><i class="fas fa-check-circle"></i></span>
                <span class="stat-info"><h3>All</h3><strong id="total-count">0</strong></span>
            </button>
        </div>

        <div id="appointments-grid" class="appointments-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary)"></i>
                <p style="margin-top: 15px; color: var(--text-secondary);">Loading your schedule...</p>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 style="font-size:1.5rem; margin-bottom:1.5rem; color: var(--primary);"><i class="fas fa-file-medical-alt"></i> Appointment Details</h2>
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="btn btn-primary" style="width: 100%; margin-top:1.5rem;"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>

    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/auth-utils.js"></script>
    <script>
        const API_BASE = window.APP_CONFIG.API_BASE_URL;
        const API_URL = `${API_BASE}/api/appointments/`;
        const DEFAULT_CONSULTATION_FEE = 500;
        const gridContainer = document.getElementById('appointments-grid');
        let allAppointments = [];
        let currentFilter = 'all';

        // --- THEME ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'light';
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        setTheme(savedTheme);
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // --- AUTH ---
        const userStr = sessionStorage.getItem('user');
        if(!userStr) { window.location.href = 'login.html'; } 
        else {
            let user;
            try {
                user = JSON.parse(userStr);
            } catch {
                sessionStorage.removeItem('user');
                window.location.href = 'login.html';
            }
            if (user.role !== 'patient') { window.location.href = 'index.html'; }
            document.getElementById('user-name').textContent = user.first_name || "Patient";
        }

        // --- LOAD DATA ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await authApiFetch(API_URL);
                if (!res.ok) throw new Error("Failed to fetch");
                allAppointments = await res.json();
                updateStats(allAppointments);
                renderAppointments(allAppointments);
            } catch (err) {
                gridContainer.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Unable to Load Appointments</h3><p>Server error.</p><button class="btn btn-primary" onclick="location.reload()">Try Again</button></div>`;
            }
        });

        function updateStats(apps) {
            document.getElementById('pending-count').textContent = apps.filter(a => a.status === 'pending').length;
            document.getElementById('confirmed-count').textContent = apps.filter(a => a.status === 'confirmed').length;
            document.getElementById('cancelled-count').textContent = apps.filter(a => a.status === 'cancelled').length;
            document.getElementById('completed-count').textContent = apps.filter(a => a.status === 'completed').length;
            document.getElementById('total-count').textContent = apps.length;
        }

        function filterAppointments(status) {
            currentFilter = status;
            ['card-pending', 'card-confirmed', 'card-cancelled', 'card-completed', 'card-all'].forEach(id => document.getElementById(id).classList.remove('active-filter'));
            if (status === 'pending') document.getElementById('card-pending').classList.add('active-filter');
            else if (status === 'confirmed') document.getElementById('card-confirmed').classList.add('active-filter');
            else if (status === 'cancelled') document.getElementById('card-cancelled').classList.add('active-filter');
            else if (status === 'completed') document.getElementById('card-completed').classList.add('active-filter');
            else document.getElementById('card-all').classList.add('active-filter');

            const filteredList = status === 'all' ? allAppointments : allAppointments.filter(app => app.status === status);
            renderAppointments(filteredList);
        }

        // --- RENDER LOGIC ---
        function renderAppointments(apps) {
            gridContainer.innerHTML = '';
            if (apps.length === 0) {
                gridContainer.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-plus"></i><h3>No Appointments</h3><p>Book your first appointment.</p><a href="doctors.html" class="btn btn-primary">Find a Doctor</a></div>`;
                return;
            }

            apps.forEach(app => {
                const dateStr = new Date(app.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const doc = app.doctor_details || {};
                const fee = doc.consultation_fee || app.consultation_fee || DEFAULT_CONSULTATION_FEE;
                
                // Status Styles
                let statusColor = 'var(--status-pending-text)', statusBg = 'var(--status-pending-bg)', statusIcon = 'fa-clock';
                if(app.status === 'confirmed') { statusColor = 'var(--status-confirmed-text)'; statusBg = 'var(--status-confirmed-bg)'; statusIcon = 'fa-check-circle'; } 
                else if(app.status === 'cancelled') { statusColor = 'var(--status-cancelled-text)'; statusBg = 'var(--status-cancelled-bg)'; statusIcon = 'fa-times-circle'; }
                else if(app.status === 'completed') { statusColor = 'var(--status-completed-text)'; statusBg = 'var(--status-completed-bg)'; statusIcon = 'fa-circle-check'; }

                // --- AVATAR LOGIC START ---
                let avatarContent;
                if (doc.profile_image) {
                    // Check if URL is absolute or relative
                    const imgUrl = doc.profile_image.startsWith('http') ? doc.profile_image : `${API_BASE}${doc.profile_image}`;
                    avatarContent = `<img src="${imgUrl}" alt="Dr. ${doc.last_name || ''}">`;
                } else {
                    const initials = (doc.first_name?.[0] || 'D') + (doc.last_name?.[0] || 'R');
                    avatarContent = initials;
                }
                // --- AVATAR LOGIC END ---

                const card = `
                    <div class="app-card">
                        <div class="doctor-info">
                            <div class="doctor-avatar">${avatarContent}</div>
                            <div class="doctor-text">
                                <h3>Dr. ${doc.first_name || 'Unknown'} ${doc.last_name || ''}</h3>
                                <span>${doc.specialization || 'General Physician'}</span>
                            </div>
                        </div>
                        <div class="app-details">
                            <div class="detail-row"><i class="far fa-calendar-alt" style="color:var(--card-date-color)"></i> <span>${dateStr}</span></div>
                            <div class="detail-row"><i class="far fa-clock" style="color:var(--card-time-color)"></i> <span>${app.time}</span></div>
                            <div class="detail-row"><i class="fas fa-dollar-sign" style="color:var(--card-fee-color)"></i> <span>₹${fee} Fee</span></div>
                        </div>
                        <div class="app-footer">
                            <div class="status-badge" style="background:${statusBg}; color:${statusColor}; border: 1px solid ${statusColor}">
                                <i class="fas ${statusIcon}"></i> ${app.status}
                            </div>
                            <div class="app-actions">
                                <button onclick="openDetails(${app.id})" class="btn btn-outline"><i class="fas fa-eye"></i> Details</button>
                                <button onclick="deleteAppointment(${app.id})" class="btn btn-danger-outline" title="Delete appointment" aria-label="Delete appointment"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += card;
            });
        }

        async function deleteAppointment(id) {
            const targetAppointment = allAppointments.find(a => a.id === id);
            if (!targetAppointment) return;

            const doctor = targetAppointment.doctor_details || {};
            const doctorName = `Dr. ${doctor.first_name || 'Unknown'} ${doctor.last_name || ''}`.trim();
            const ok = confirm(`Delete appointment with ${doctorName}? This cannot be undone.`);
            if (!ok) return;

            try {
                const res = await authApiFetch(`${API_URL}${id}/`, {
                    method: 'DELETE',
                });

                if (!res.ok) {
                    throw new Error('Delete failed');
                }

                allAppointments = allAppointments.filter(a => a.id !== id);
                updateStats(allAppointments);

                const filteredList = currentFilter === 'all'
                    ? allAppointments
                    : allAppointments.filter(app => app.status === currentFilter);
                renderAppointments(filteredList);
                showFeedback('Appointment deleted successfully.');
            } catch (err) {
                showFeedback('Could not delete appointment. Please try again.', 'error');
            }
        }

        function showFeedback(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `feedback-toast ${type === 'error' ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }

        function openDetails(id) {
            const app = allAppointments.find(a => a.id === id);
            if(!app) return;
            const doc = app.doctor_details || {};
            const dateStr = new Date(app.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            document.getElementById('modal-body').innerHTML = `
                <div class="modal-row"><span>Status</span><strong style="text-transform:uppercase;">${app.status}</strong></div>
                <div class="modal-row"><span>Doctor</span><strong>Dr. ${doc.first_name || 'Unknown'} ${doc.last_name || ''}</strong></div>
                <div class="modal-row"><span>Date</span><strong>${dateStr}</strong></div>
                <div class="modal-row"><span>Time</span><strong>${app.time}</strong></div>
                <div class="modal-row"><span>Notes</span><p style="text-align:right; max-width: 60%;">${app.notes || 'No notes.'}</p></div>
            `;
            document.getElementById('details-modal').style.display = 'flex';
        }

        async function handleLogout() {
            if (!confirm('Logout?')) return;
            try {
                await fetch(`${API_BASE}/api/auth/logout/`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {
                console.warn('Logout request failed:', e);
            }
            sessionStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }
    </script>
</body>
</html>
