<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - MediCare</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('/static/css/login.css');
    .status-box { display: none; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">
    <i class="fas fa-moon"></i>
  </button>

  <a href="login.html" class="back-btn">
    <i class="fas fa-arrow-left"></i>
    Back to Sign In
  </a>

  <div class="container">
    <div class="login-card">
      <div class="card-header">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-heart-pulse"></i>
          </div>
          <span class="logo-text">MediCare</span>
        </div>
        <h1 class="welcome-title">Set New Password</h1>
        <p class="welcome-subtitle">Create your new password below</p>
      </div>

      <div class="card-body">
        <form id="reset-password-form" onsubmit="submitReset(event)">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" readonly required>
          </div>

          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <input type="password" id="new-password" class="form-input" placeholder="Enter new password" minlength="6" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password" minlength="6" required>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="btn-text">Reset Password</span>
            <span id="btn-spinner" class="hidden">
              <span class="spinner"></span> Resetting...
            </span>
          </button>
        </form>

        <div id="success-box" class="status-box">
          <h3 style="color: #10B981; margin-bottom: 10px;"><i class="fas fa-check-circle"></i> Password Reset Successful</h3>
          <p style="color: var(--text-muted); margin-bottom: 14px;">You can now sign in with your new password.</p>
          <a href="login.html" class="btn btn-primary" style="text-decoration:none;">Go to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/static/js/app-config.js"></script>
  <script>
    const API_PASSWORD_RESET_CONFIRM = `${window.APP_CONFIG.API_BASE_URL}/api/auth/password-reset-confirm/`;
    let token = '';

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const savedTheme = localStorage.getItem('theme');

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    if (savedTheme) setTheme(savedTheme);
    else if (prefersDark.matches) setTheme('dark');
    else setTheme('light');

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
      toast.style.cssText = `
        background: ${isError ? '#FEE2E2' : '#D1FAE5'};
        color: ${isError ? '#991B1B' : '#065F46'};
        border: 1px solid ${isError ? '#FCA5A5' : '#6EE7B7'};
        padding: 12px 16px;
        border-radius: 8px;
        margin-top: 10px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      `;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function initFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || '';
      token = params.get('token') || '';

      document.getElementById('email').value = email;

      if (!email || !token) {
        showToast('Invalid reset link. Request a new one.', true);
        document.getElementById('submitBtn').disabled = true;
      }
    }

    async function submitReset(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('submitBtn');
      const text = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');

      if (newPassword !== confirmPassword) {
        showToast('Passwords do not match.', true);
        return;
      }

      btn.disabled = true;
      btn.classList.add('btn-loading');
      text.classList.add('hidden');
      spinner.classList.remove('hidden');

      try {
        const res = await fetch(API_PASSWORD_RESET_CONFIRM, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            token,
            new_password: newPassword
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showToast(data.detail || 'Unable to reset password.', true);
          return;
        }

        document.getElementById('reset-password-form').style.display = 'none';
        document.getElementById('success-box').style.display = 'block';
        showToast(data.detail || 'Password reset successful.');
      } catch (err) {
        showToast('Network error. Check if backend is running.', true);
      } finally {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }

    initFromQuery();
  </script>
</body>
</html>
